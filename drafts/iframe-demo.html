<!DOCTYPE html>

<body>
  <header></header>
  <main>
    <div>

        <div>
          <div>
            <p><a href="https://www.starhealth.in/component/lookup/hospital/">https://www.starhealth.in/component/lookup/hospital/</a></p>
          </div>
        </div>
      </div>

      <h2>Default height (600px)</h2>

      <div class="iframe">
        <div>
          <div>
            <p><a href="https://www.starhealth.in/component/lookup/hospital/">starhealth.in/component/lookup/hospital/</a></p>
          </div>
        </div>
      </div>
    </div>
  </main>
  <footer></footer>
</body>
</html>
